<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1052" cy="389" r="27" fill="#115e59" opacity="0.14"/>
    <circle cx="841" cy="211" r="95" fill="#115e59" opacity="0.15"/>
    <circle cx="363" cy="284" r="31" fill="#115e59" opacity="0.10"/>
    <circle cx="1169" cy="395" r="85" fill="#115e59" opacity="0.07"/>
    <circle cx="1005" cy="-73" r="95" fill="#115e59" opacity="0.18"/>
    <circle cx="61" cy="369" r="91" fill="#115e59" opacity="0.09"/>
    <rect x="868" y="114" width="99" height="72" rx="8" fill="#0f766e" opacity="0.11" transform="rotate(10, 1003, 454)"/>
    <rect x="324" y="325" width="55" height="49" rx="8" fill="#0f766e" opacity="0.06" transform="rotate(44, 726, -55)"/>
    <rect x="338" y="48" width="53" height="59" rx="8" fill="#0f766e" opacity="0.05" transform="rotate(29, 601, 697)"/>
    <rect x="1240" y="419" width="46" height="86" rx="8" fill="#0f766e" opacity="0.10" transform="rotate(25, 666, 180)"/>
    <rect x="709" y="263" width="88" height="84" rx="8" fill="#0f766e" opacity="0.12" transform="rotate(8, 1102, 728)"/>
    <rect x="735" y="557" width="37" height="73" rx="8" fill="#0f766e" opacity="0.10" transform="rotate(34, 1127, 464)"/>
    <rect x="1165" y="185" width="99" height="86" rx="8" fill="#0f766e" opacity="0.14" transform="rotate(39, 1113, 386)"/>
    <rect x="1166" y="39" width="86" height="93" rx="8" fill="#0f766e" opacity="0.08" transform="rotate(0, 43, 292)"/>
    <polygon points="1215,618 1303,794 1127,794" fill="#115e59" opacity="0.05"/>
    <polygon points="488,-52 578,128 398,128" fill="#115e59" opacity="0.08"/>
    <polygon points="673,639 726,745 620,745" fill="#115e59" opacity="0.12"/>
    <polygon points="-45,625 46,807 -136,807" fill="#115e59" opacity="0.12"/>

  <!-- Wave at bottom -->
  <path d="M0,556 C360,593 840,519 1200,556 L1200,630 L0,630Z" fill="#115e59" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    공덕 마사지 링크
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    공덕 — 마사지
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#2dd4bf" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    공덕 공덕 마사지 링크 — 마사지
  </text>
</svg>